            - text: .
          - figure "Ben Jonson coined the term \"playwright\"." [ref=e91]:
            - link [ref=e92] [cursor=pointer]:
              - /url: /wiki/File:Benjamin_Jonson_by_Abraham_van_Blyenberch.jpg
              - img [ref=e93]
            - generic [ref=e94]:
              - link "Ben Jonson" [ref=e95] [cursor=pointer]:
                - /url: /wiki/Ben_Jonson
              - text: coined the term "playwright".
          - paragraph [ref=e96]:
            - text: A playwright or dramatist is a person who writes
            - link "plays" [ref=e97] [cursor=pointer]:
              - /url: /wiki/Play_(theatre)
            - text: ", which are a form of"
            - link "drama" [ref=e98] [cursor=pointer]:
              - /url: /wiki/Drama
            - text: that primarily consists of
            - link "dialogue" [ref=e99] [cursor=pointer]:
              - /url: /wiki/Dialogue
            - text: between
            - link "characters" [ref=e100] [cursor=pointer]:
              - /url: /wiki/Character_(arts)
            - text: and is intended for
            - link "theatrical" [ref=e101] [cursor=pointer]:
              - /url: /wiki/Theatre
            - link "performance" [ref=e102] [cursor=pointer]:
              - /url: /wiki/Performance
            - text: rather than just
            - link "reading" [ref=e103] [cursor=pointer]:
              - /url: /wiki/Reading_(process)
            - text: .
            - link "Ben Jonson" [ref=e104] [cursor=pointer]:
              - /url: /wiki/Ben_Jonson
            - text: coined the term playwright and is the first person in
            - link "English literature" [ref=e105] [cursor=pointer]:
              - /url: /wiki/English_literature
            - text: to refer to playwrights as separate from
            - link "poets" [ref=e106] [cursor=pointer]:
              - /url: /wiki/Poet
            - text: .
          - paragraph [ref=e107]:
            - text: The earliest playwrights in
            - link "Western literature" [ref=e108] [cursor=pointer]:
              - /url: /wiki/Western_literature
            - text: with surviving works are the
            - link "Ancient Greeks" [ref=e109] [cursor=pointer]:
              - /url: /wiki/Ancient_Greek
            - text: .
            - link "William Shakespeare" [ref=e110] [cursor=pointer]:
              - /url: /wiki/William_Shakespeare
            - text: is amongst the most famous playwrights in literature, both in England and across the world.
          - generic [ref=e111]:
            - heading "Etymology" [level=2] [ref=e112]
            - generic [ref=e113]:
              - text: "["
              - link "edit" [ref=e114] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=1
              - text: "]"
          - paragraph [ref=e115]:
            - text: The word play is from Middle English
            - generic "Middle English (1100-1500)-language text" [ref=e116]: pleye
            - text: ", from Old English"
            - generic "Old English (ca. 450-1100)-language text" [ref=e117]: plæġ, pleġa, plæġa
            - text: ('play, exercise; sport, game; drama, applause').
            - superscript [ref=e118]:
              - link "[1]" [ref=e119] [cursor=pointer]:
                - /url: "#cite_note-1"
            - text: The word
            - link "wright" [ref=e121] [cursor=pointer]:
              - /url: https://en.wiktionary.org/wiki/wright
            - text: is an archaic English term for a
            - link "craftsperson" [ref=e122] [cursor=pointer]:
              - /url: /wiki/Artisan
            - text: or builder (as in a
            - link "wheelwright" [ref=e123] [cursor=pointer]:
              - /url: /wiki/Wheelwright
            - text: or
            - link "cartwright" [ref=e124] [cursor=pointer]:
              - /url: /wiki/Wagon
            - text: ).
            - superscript [ref=e125]:
              - link "[2]" [ref=e126] [cursor=pointer]:
                - /url: "#cite_note-2"
            - text: The words combine to indicate a person who has wrought words, themes, and other elements into a dramatic form — a play. (The
            - link "homophone" [ref=e127] [cursor=pointer]:
              - /url: /wiki/Homophone
            - text: with write is coincidental.)
          - paragraph [ref=e128]:
            - text: The first recorded use of the term playwright is from 1605,
            - superscript [ref=e129]:
              - link "[3]" [ref=e130] [cursor=pointer]:
                - /url: "#cite_note-3"
            - text: 73 years before the first written record of the term dramatist.
            - superscript [ref=e131]:
              - link "[4]" [ref=e132] [cursor=pointer]:
                - /url: "#cite_note-4"
            - text: It appears to have been first used in a pejorative sense by
            - link "Ben Jonson" [ref=e133] [cursor=pointer]:
              - /url: /wiki/Ben_Jonson
            - superscript [ref=e134]:
              - link "[5]" [ref=e135] [cursor=pointer]:
                - /url: "#cite_note-5"
            - text: to suggest a mere tradesman fashioning works for the theatre.
          - paragraph [ref=e136]:
            - text: Jonson uses the word in his Epigram 49, which is thought to refer to
            - link "John Marston" [ref=e137] [cursor=pointer]:
              - /url: /wiki/John_Marston_(playwright)
            - superscript [ref=e138]:
              - link "[6]" [ref=e139] [cursor=pointer]:
                - /url: "#cite_note-6"
            - text: or
            - link "Thomas Dekker" [ref=e140] [cursor=pointer]:
              - /url: /wiki/Thomas_Dekker_(writer)
            - text: ":"
            - superscript [ref=e141]:
              - link "[7]" [ref=e142] [cursor=pointer]:
                - /url: "#cite_note-7"
          - blockquote [ref=e143]:
            - paragraph [ref=e145]:
              - text: Epigram XLIX — On Playwright
              - text: PLAYWRIGHT me reads, and still my verses damns,
              - text: He says I want the tongue of epigrams;
              - text: I have no salt, no bawdry he doth mean;
              - text: For witty, in his language, is obscene.
              - text: Playwright, I loath to have thy manners known
              - text: In my chaste book; I profess them in thine own.
          - paragraph [ref=e146]: Jonson described himself as a poet, not a playwright, since plays during that time were written in meter and so were regarded as the province of poets. This view was held as late as the early 19th century. The term "playwright" later again lost this negative connotation.
          - generic [ref=e147]:
            - heading "History" [level=2] [ref=e148]
            - generic [ref=e149]:
              - text: "["
              - link "edit" [ref=e150] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=2
              - text: "]"
          - note [ref=e151]:
            - text: "Further information:"
            - link "List of playwrights" [ref=e152] [cursor=pointer]:
              - /url: /wiki/List_of_playwrights
          - generic [ref=e153]:
            - heading "Early playwrights" [level=3] [ref=e154]
            - generic [ref=e155]:
              - text: "["
              - link "edit" [ref=e156] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=3
              - text: "]"
          - paragraph [ref=e157]:
            - text: The earliest playwrights in Western literature with surviving works are the
            - link "Ancient Greeks" [ref=e158] [cursor=pointer]:
              - /url: /wiki/Ancient_Greek
            - text: . These early plays were for annual
            - link "Athenian" [ref=e159] [cursor=pointer]:
              - /url: /wiki/Athens
            - text: competitions among play writers
            - superscript [ref=e160]:
              - link "[8]" [ref=e161] [cursor=pointer]:
                - /url: "#cite_note-8"
            - text: held around the 5th century BC. Such notables as
            - link "Aeschylus" [ref=e162] [cursor=pointer]:
              - /url: /wiki/Aeschylus
            - text: ","
            - link "Sophocles" [ref=e163] [cursor=pointer]:
              - /url: /wiki/Sophocles
            - text: ","
            - link "Euripides" [ref=e164] [cursor=pointer]:
              - /url: /wiki/Euripides
            - text: ", and"
            - link "Aristophanes" [ref=e165] [cursor=pointer]:
              - /url: /wiki/Aristophanes
            - text: established forms still relied on by their modern counterparts. We have complete texts
            - link "extant" [ref=e166] [cursor=pointer]:
              - /url: /wiki/Extant_literature
            - text: by Aeschylus, Sophocles, and
            - link "Euripides" [ref=e167] [cursor=pointer]:
              - /url: /wiki/Euripides
            - text: .
            - superscript [ref=e168]:
              - link "[9]" [ref=e169] [cursor=pointer]:
                - /url: "#cite_note-9"
            - superscript [ref=e170]:
              - link "[a]" [ref=e171] [cursor=pointer]:
                - /url: "#cite_note-10"
            - text: The origins of
            - link "Athenian tragedy" [ref=e172] [cursor=pointer]:
              - /url: /wiki/Tragedy#Greek
            - text: remain obscure, though by the 5th century it was
            - link "institutionalised" [ref=e173] [cursor=pointer]:
              - /url: /wiki/Institution
            - text: in competitions (
            - link "agon" [ref=e175] [cursor=pointer]:
              - /url: /wiki/Agon
            - text: ) held as part of festivities celebrating
            - link "Dionysos" [ref=e176] [cursor=pointer]:
              - /url: /wiki/Dionysos
            - text: (the
            - link "god" [ref=e177] [cursor=pointer]:
              - /url: /wiki/Family_tree_of_the_Greek_gods
            - text: of
            - link "wine" [ref=e178] [cursor=pointer]:
              - /url: /wiki/Wine
            - text: and
            - link "fertility" [ref=e179] [cursor=pointer]:
              - /url: /wiki/Fertility
            - text: ).
            - superscript [ref=e180]:
              - link "[10]" [ref=e181] [cursor=pointer]:
                - /url: "#cite_note-11"
            - text: As contestants in the
            - link "City Dionysia's" [ref=e182] [cursor=pointer]:
              - /url: /wiki/City_Dionysia
            - text: competition (the most prestigious of the festivals to stage drama), playwrights were required to present a
            - link "tetralogy" [ref=e183] [cursor=pointer]:
              - /url: /wiki/Tetralogy
            - text: of plays (though the individual works were not necessarily connected by story or theme), which usually consisted of three tragedies and one satyr play.
            - superscript [ref=e184]:
              - link "[11]" [ref=e185] [cursor=pointer]:
                - /url: "#cite_note-12"
            - superscript [ref=e187]:
              - link "[b]" [ref=e188] [cursor=pointer]:
                - /url: "#cite_note-13"
          - paragraph [ref=e189]:
            - text: For the ancient Greeks, playwriting involved
            - link "poïesis" [ref=e191] [cursor=pointer]:
              - /url: /wiki/Poiesis
            - text: ", \"the act of making\". This is the source of the English word poet."
          - paragraph [ref=e192]:
            - text: Despite
            - link "Chinese Theatre" [ref=e193] [cursor=pointer]:
              - /url: /wiki/Chinese_Theatre
            - text: having performers dated back to the 6th century BC with
            - link "You Meng" [ref=e194] [cursor=pointer]:
              - /url: /wiki/You_Meng
            - text: ", their perspective of theatre was such that plays had no other role than \"performer\" or \"actor\", but given that the performers were also the ones who invented their performances, they could be considered a form of playwright."
            - superscript [ref=e195]:
              - link "[12]" [ref=e196] [cursor=pointer]:
                - /url: "#cite_note-14"
          - paragraph [ref=e197]:
            - text: Outside of the Western world there is
            - link "Indian classical drama" [ref=e198] [cursor=pointer]:
              - /url: /wiki/Indian_classical_drama
            - text: ", with one of the oldest known playwrights being"
            - link "Śudraka" [ref=e199] [cursor=pointer]:
              - /url: /wiki/%C5%9Audraka
            - text: ", whose attributed plays can be dated to the second century BC."
            - superscript [ref=e200]:
              - link "[13]" [ref=e201] [cursor=pointer]:
                - /url: "#cite_note-15"
            - text: The
            - link "Nāṭya Shāstra" [ref=e203] [cursor=pointer]:
              - /url: /wiki/Natya_Shastra
            - text: ", a text on the performing arts from between 500BC-500AD, categorizes playwrights as being among the members of a theatre company, although playwrights were generally the highest in social status, with some being kings."
            - superscript [ref=e204]:
              - link "[14]" [ref=e205] [cursor=pointer]:
                - /url: "#cite_note-16"
          - generic [ref=e206]:
            - heading "Aristotle's Poetics techniques" [level=3] [ref=e207]: Aristotle's Poetics techniques
            - generic [ref=e208]:
              - text: "["
              - link "edit" [ref=e209] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=4
              - text: "]"
          - paragraph [ref=e210]:
            - text: In the 4th century BCE,
            - link "Aristotle" [ref=e211] [cursor=pointer]:
              - /url: /wiki/Aristotle
            - text: wrote his
            - link "Poetics" [ref=e213] [cursor=pointer]:
              - /url: /wiki/Poetics_(Aristotle)
            - text: ", in which he analyzed the principle of action or praxis as the basis for tragedy."
            - superscript [ref=e214]:
              - link "[15]" [ref=e215] [cursor=pointer]:
                - /url: "#cite_note-:0-17"
            - text: "He then considered elements of drama:"
            - link "plot" [ref=e216] [cursor=pointer]:
              - /url: /wiki/Plot_(narrative)
            - text: (
            - generic [ref=e217]:
              - generic "Greek-language text" [ref=e218]: μύθος
              - generic "Greek-language text" [ref=e219]: mythos
            - text: ), character (
            - generic [ref=e220]:
              - generic "Greek-language text" [ref=e221]: ἔθος
              - generic "Greek-language text" [ref=e222]:
                - link "ethos" [ref=e224] [cursor=pointer]:
                  - /url: /wiki/Ethos
            - text: ), thought (
            - generic "Greek-language text" [ref=e226]:
              - link "dianoia" [ref=e228] [cursor=pointer]:
                - /url: /wiki/Dianoia
            - text: ), diction (
            - generic "Greek-language text" [ref=e230]:
              - link "lexis" [ref=e232] [cursor=pointer]:
                - /url: /wiki/Lexis_(Aristotle)
            - text: ), music (
            - generic "Greek-language text" [ref=e234]:
              - link "melodia" [ref=e236] [cursor=pointer]:
                - /url: /wiki/Melody
            - text: ), and spectacle (
            - generic "Greek-language text" [ref=e238]: opsis
            - text: ). Since the
            - link "myths" [ref=e239] [cursor=pointer]:
              - /url: /wiki/Mythology
            - text: on which
            - link "Greek tragedy" [ref=e240] [cursor=pointer]:
              - /url: /wiki/Greek_tragedy
            - text: were based were widely known, plot had to do with the arrangement and selection of existing material.
            - superscript [ref=e241]:
              - link "[15]" [ref=e242] [cursor=pointer]:
                - /url: "#cite_note-:0-17"
            - text: Character was determined by choice and by action. Tragedy is
            - link "mimesis" [ref=e243] [cursor=pointer]:
              - /url: /wiki/Mimesis
            - text: — "the imitation of an action that is serious". He developed his notion of
            - link "hamartia" [ref=e244] [cursor=pointer]:
              - /url: /wiki/Hamartia
            - text: ", or tragic flaw, an error in judgment by the main character or"
            - link "protagonist" [ref=e245] [cursor=pointer]:
              - /url: /wiki/Protagonist
            - text: ", which provides the basis for the \"conflict-driven\" play."
            - superscript [ref=e246]:
              - link "[15]" [ref=e247] [cursor=pointer]:
                - /url: "#cite_note-:0-17"
          - figure "The Chandos portrait, likely depicting Shakespeare, c. 1611" [ref=e248]:
            - link [ref=e249] [cursor=pointer]:
              - /url: /wiki/File:William_Shakespeare_by_John_Taylor,_edited.jpg
              - img [ref=e250]
            - generic [ref=e252]:
              - text: The
              - link "Chandos portrait" [ref=e253] [cursor=pointer]:
                - /url: /wiki/Chandos_portrait
              - text: ", likely depicting Shakespeare, c. 1611"
          - generic [ref=e254]:
            - heading "Medieval" [level=3] [ref=e255]
            - generic [ref=e256]:
              - text: "["
              - link "edit" [ref=e257] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=5
              - text: "]"
          - paragraph [ref=e258]:
            - text: There were also a number of secular performances staged in the Middle Ages, the earliest of which is The Play of the Greenwood by
            - link "Adam de la Halle" [ref=e259] [cursor=pointer]:
              - /url: /wiki/Adam_de_la_Halle
            - text: in 1276. It contains satirical scenes and
            - link "folk" [ref=e260] [cursor=pointer]:
              - /url: /wiki/Folk_culture
            - text: material such as
            - link "faeries" [ref=e261] [cursor=pointer]:
              - /url: /wiki/Faeries
            - text: and other supernatural occurrences.
            - link "Farces" [ref=e262] [cursor=pointer]:
              - /url: /wiki/Farce
            - text: also rose dramatically in popularity after the 13th century. The majority of these plays come from France and Germany and are similar in tone and form, emphasizing
            - link "sex" [ref=e263] [cursor=pointer]:
              - /url: /wiki/Sex
            - text: and bodily excretions.
            - superscript [ref=e264]:
              - link "[16]" [ref=e265] [cursor=pointer]:
                - /url: "#cite_note-18"
          - paragraph [ref=e266]:
            - text: The best known playwright of farces is
            - link "Hans Sachs" [ref=e267] [cursor=pointer]:
              - /url: /wiki/Hans_Sachs
            - text: (1494–1576) who wrote 198 dramatic works. In England,
            - link "The Second Shepherds' Play" [ref=e268] [cursor=pointer]:
              - /url: /wiki/The_Second_Shepherds%27_Play
            - text: of the
            - link "Wakefield Cycle" [ref=e269] [cursor=pointer]:
              - /url: /wiki/Wakefield_Cycle
            - text: is the best known early farce. However, farce did not appear independently in England until the 16th century with the work of
            - link "John Heywood" [ref=e270] [cursor=pointer]:
              - /url: /wiki/John_Heywood
            - text: (1497–1580).
          - paragraph [ref=e271]:
            - text: Playwright
            - link "William Shakespeare" [ref=e272] [cursor=pointer]:
              - /url: /wiki/William_Shakespeare
            - text: remains arguably the most influential writer in the English language, and his works continue to be studied and reinterpreted. Most playwrights of the period typically collaborated with others at some point, as critics agree Shakespeare did, mostly early and late in his career.
            - superscript [ref=e273]:
              - link "[17]" [ref=e274] [cursor=pointer]:
                - /url: "#cite_note-19"
            - text: His plays have been
            - link "translated" [ref=e275] [cursor=pointer]:
              - /url: /wiki/List_of_translations_of_works_by_William_Shakespeare
            - text: into every major
            - link "living language" [ref=e276] [cursor=pointer]:
              - /url: /wiki/Modern_language
            - text: and are performed more often than those of any other playwright.
            - superscript [ref=e277]:
              - link "[18]" [ref=e278] [cursor=pointer]:
                - /url: "#cite_note-20"
          - paragraph [ref=e279]:
            - text: In England, after the
            - link "interregnum" [ref=e280] [cursor=pointer]:
              - /url: /wiki/Interregnum_(British_Isles)
            - text: ", and"
            - link "Restoration" [ref=e281] [cursor=pointer]:
              - /url: /wiki/Restoration_(England)
            - text: of the
            - link "monarchy" [ref=e282] [cursor=pointer]:
              - /url: /wiki/Monarchy
            - text: in 1660, there was a move toward neoclassical dramaturgy. Between
            - link "the Restoration" [ref=e283] [cursor=pointer]:
              - /url: /wiki/Stuart_Restoration
            - text: of the monarchy in 1660 and the end of the 17th century, classical ideas were in vogue. As a result, critics of the time mostly rated Shakespeare below
            - link "John Fletcher" [ref=e284] [cursor=pointer]:
              - /url: /wiki/John_Fletcher_(playwright)
            - text: and Ben Jonson.
            - superscript [ref=e285]:
              - link "[19]" [ref=e286] [cursor=pointer]:
                - /url: "#cite_note-21"
            - text: This period saw the first professional woman playwright,
            - link "Aphra Behn" [ref=e287] [cursor=pointer]:
              - /url: /wiki/Aphra_Behn
            - text: .
          - paragraph [ref=e288]:
            - text: As a reaction to the decadence of Charles II era productions,
            - link "sentimental comedy" [ref=e289] [cursor=pointer]:
              - /url: /wiki/Sentimental_comedy
            - text: grew in popularity. Playwrights like
            - link "Colley Cibber" [ref=e290] [cursor=pointer]:
              - /url: /wiki/Colley_Cibber
            - text: and
            - link "Richard Steele" [ref=e291] [cursor=pointer]:
              - /url: /wiki/Richard_Steele
            - text: believed that humans were inherently good but capable of being led astray.
            - superscript [ref=e292]:
              - link "[20]" [ref=e293] [cursor=pointer]:
                - /url: "#cite_note-Campbell-22"
            - superscript [ref=e294]:
