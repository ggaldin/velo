          - figure "The literary production of Aleksis Kivi, the Finnish national author, consisted mainly of plays. One of his best-known plays is Heath Cobblers from 1864." [ref=e300]:
            - link [ref=e301] [cursor=pointer]:
              - /url: /wiki/File:Aleksis_Kivi.jpg
              - img [ref=e302]
            - generic [ref=e303]:
              - text: The literary production of
              - link "Aleksis Kivi" [ref=e304] [cursor=pointer]:
                - /url: /wiki/Aleksis_Kivi
              - text: ", the"
              - link "Finnish" [ref=e305] [cursor=pointer]:
                - /url: /wiki/Finland
              - text: national author, consisted mainly of plays. One of his best-known plays is
              - link "Heath Cobblers" [ref=e307] [cursor=pointer]:
                - /url: /wiki/Heath_Cobblers
              - text: from 1864.
          - paragraph [ref=e308]:
            - text: The
            - link "Italian Renaissance" [ref=e309] [cursor=pointer]:
              - /url: /wiki/Italian_Renaissance
            - text: brought about a stricter interpretation of Aristotle, as this long-lost work came to light in the late 15th century. The
            - link "neoclassical" [ref=e310] [cursor=pointer]:
              - /url: /wiki/Neoclassical_architecture
            - text: ideal, which was to reach its apogee in France during the 17th century, dwelled upon the
            - link "unities" [ref=e311] [cursor=pointer]:
              - /url: /wiki/Unities
            - text: ", of action, place, and time. This meant that the playwright had to construct the play so that its \"virtual\" time would not exceed 24 hours, that it would be restricted to a single setting, and that there would be no subplots. Other terms, such as verisimilitude and decorum, circumscribed the subject matter significantly. For example, verisimilitude limits of the unities. Decorum fitted proper protocols for behavior and language on stage."
          - paragraph [ref=e312]:
            - text: In France, contained too many events and actions, thus, violating the 24-hour restriction of the unity of time. Neoclassicism never had as much traction in England, and
            - link "Shakespeare" [ref=e313] [cursor=pointer]:
              - /url: /wiki/Shakespeare
            - text: "'s plays are directly opposed to these models, while in Italy, improvised and bawdy"
            - link "commedia dell'arte" [ref=e314] [cursor=pointer]:
              - /url: /wiki/Commedia_dell%27arte
            - text: and opera were more popular forms.
          - paragraph [ref=e315]:
            - text: One structural unit that is still useful to playwrights today is the "
            - link "French scene" [ref=e316] [cursor=pointer]:
              - /url: /wiki/French_scenes
            - text: "\", which is a scene in a play where the beginning and end are marked by a change in the makeup of the group of characters onstage rather than by the lights going up or down or the set being changed."
            - superscript [ref=e317]:
              - link "[22]" [ref=e318] [cursor=pointer]:
                - /url: "#cite_note-George-24"
          - paragraph [ref=e319]: "Notable playwrights:"
          - list [ref=e320]:
            - listitem [ref=e321]:
              - link "Pierre Corneille" [ref=e322] [cursor=pointer]:
                - /url: /wiki/Pierre_Corneille
              - text: (1606–84)
            - listitem [ref=e323]:
              - link "Molière" [ref=e324] [cursor=pointer]:
                - /url: /wiki/Moli%C3%A8re
              - text: (1622–73)
            - listitem [ref=e325]:
              - link "Jean Racine" [ref=e326] [cursor=pointer]:
                - /url: /wiki/Jean_Racine
              - text: (1639–99)
          - generic [ref=e327]:
            - heading "Cretan Renaissance theatre" [level=3] [ref=e328]
            - generic [ref=e329]:
              - text: "["
              - link "edit" [ref=e330] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=7
              - text: "]"
          - paragraph [ref=e331]:
            - text: Greek theater was alive and flourishing on the island of Crete. During the
            - link "Cretan Renaissance" [ref=e332] [cursor=pointer]:
              - /url: /wiki/Cretan_school
            - text: two notable Greek playwrights
            - link "Georgios Chortatzis" [ref=e333] [cursor=pointer]:
              - /url: /wiki/Georgios_Chortatzis
            - text: and
            - link "Vitsentzos Kornaros" [ref=e334] [cursor=pointer]:
              - /url: /wiki/Vitsentzos_Kornaros
            - text: were present in the latter part of the 16th century.
            - superscript [ref=e335]:
              - link "[23]" [ref=e336] [cursor=pointer]:
                - /url: "#cite_note-25"
          - generic [ref=e337]:
            - heading "19th century" [level=3] [ref=e338]
            - generic [ref=e339]:
              - text: "["
              - link "edit" [ref=e340] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=8
              - text: "]"
          - paragraph [ref=e341]:
            - text: The plays of
            - link "Gotthold Ephraim Lessing" [ref=e342] [cursor=pointer]:
              - /url: /wiki/Gotthold_Ephraim_Lessing
            - text: ","
            - link "Johann Wolfgang von Goethe" [ref=e343] [cursor=pointer]:
              - /url: /wiki/Johann_Wolfgang_von_Goethe
            - text: ","
            - link "Friedrich Schiller" [ref=e344] [cursor=pointer]:
              - /url: /wiki/Friedrich_Schiller
            - text: ", and other"
            - link "Sturm und Drang" [ref=e346] [cursor=pointer]:
              - /url: /wiki/Sturm_und_Drang
            - text: playwrights inspired a growing faith in feeling and instinct as guides to moral behavior and were part of the
            - link "German romanticism" [ref=e347] [cursor=pointer]:
              - /url: /wiki/German_Romanticism
            - text: movement.
            - link "Aleksandr Ostrovsky" [ref=e348] [cursor=pointer]:
              - /url: /wiki/Aleksandr_Ostrovsky
            - text: was Russia's first professional playwright).
          - generic [ref=e349]:
            - heading "Contemporary playwrights in the United States" [level=3] [ref=e350]
            - generic [ref=e351]:
              - text: "["
              - link "edit" [ref=e352] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=9
              - text: "]"
          - paragraph [ref=e353]:
            - text: Author and playwright
            - link "Agatha Christie" [ref=e354] [cursor=pointer]:
              - /url: /wiki/Agatha_Christie
            - text: wrote
            - link "The Moustrap" [ref=e356] [cursor=pointer]:
              - /url: /wiki/The_Mousetrap
            - text: ", a"
            - link "murder mystery" [ref=e357] [cursor=pointer]:
              - /url: /wiki/Murder_mystery
            - text: play which is the
            - link "longest-running West End show" [ref=e358] [cursor=pointer]:
              - /url: /wiki/List_of_the_longest-running_West_End_shows
            - text: ", it has by far the longest run of any play in the world, with its 29,500th performance having taken place as of February 2024."
            - superscript [ref=e359]:
              - link "[24]" [ref=e360] [cursor=pointer]:
                - /url: "#cite_note-26"
          - paragraph [ref=e361]:
            - text: Contemporary playwrights in the
            - link "United States" [ref=e362] [cursor=pointer]:
              - /url: /wiki/United_States
            - text: are affected by recent declines in theatre attendance.
            - superscript [ref=e363]:
              - link "[25]" [ref=e364] [cursor=pointer]:
                - /url: "#cite_note-27"
            - text: No longer the only outlet for serious drama or entertaining comedies, theatrical productions must use ticket sales as a source of income, which has caused many of them to reduce the number of new works being produced. For example,
            - link "Playwrights Horizons" [ref=e365] [cursor=pointer]:
              - /url: /wiki/Playwrights_Horizons
            - text: produced only six plays in the 2002–03 seasons, compared with thirty-one in 1973–74.
            - superscript [ref=e366]:
              - link "[26]" [ref=e367] [cursor=pointer]:
                - /url: "#cite_note-28"
            - text: Playwrights commonly encounter difficulties in getting their shows produced and often cannot earn a living through their plays alone, leading them to take up other jobs to supplement their incomes.
            - superscript [ref=e368]:
              - link "[27]" [ref=e369] [cursor=pointer]:
                - /url: "#cite_note-29"
          - paragraph [ref=e370]:
            - text: Many playwrights are also
            - link "film makers" [ref=e371] [cursor=pointer]:
              - /url: /wiki/Film_makers
            - text: . For instance, filmmaker
            - link "Morgan Spurlock" [ref=e372] [cursor=pointer]:
              - /url: /wiki/Morgan_Spurlock
            - text: began his career as a playwright, winning awards for his play The Phoenix at both the New York
            - link "International Fringe Festival" [ref=e373] [cursor=pointer]:
              - /url: /wiki/Fringe_theatre
            - text: in 1999 and the Route 66 American Playwriting Competition in 2000.
            - superscript [ref=e374]:
              - link "[28]" [ref=e375] [cursor=pointer]:
                - /url: "#cite_note-30"
          - generic [ref=e376]:
            - heading "New play development" [level=4] [ref=e377]
            - generic [ref=e378]:
              - text: "["
              - link "edit" [ref=e379] [cursor=pointer]:
                - /url: /w/index.php?title=Playwright&action=edit&section=10
              - text: "]"
          - paragraph [ref=e380]:
            - text: Today, theatre companies have new play development programs meant to develop new American voices in playwriting. Many regional theatres have hired dramaturges and literary managers in an effort to showcase various festivals for new work, or bring in playwrights for residencies.
            - superscript [ref=e381]:
              - link "[29]" [ref=e382] [cursor=pointer]:
                - /url: "#cite_note-31"
            - text: Funding through national organizations, such as the
            - link "National Endowment for the Arts" [ref=e383] [cursor=pointer]:
              - /url: /wiki/National_Endowment_for_the_Arts
            - superscript [ref=e384]:
              - link "[30]" [ref=e385] [cursor=pointer]:
                - /url: "#cite_note-32"
            - text: and the
            - link "Theatre Communications Group" [ref=e386] [cursor=pointer]:
              - /url: /wiki/Theatre_Communications_Group
            - text: ", encouraged the partnerships of professional theatre companies and emerging playwrights."
            - superscript [ref=e387]:
              - link "[31]" [ref=e388] [cursor=pointer]:
                - /url: "#cite_note-33"
          - paragraph [ref=e389]:
            - text: Playwrights will often have a
            - link "cold reading" [ref=e390] [cursor=pointer]:
              - /url: /wiki/Cold_reading_(theatrical)
            - text: of a script in an informal sitdown setting, which allows them to evaluate their own plays and the actors performing them. Cold reading means that the actors haven't rehearsed the work, or may be seeing it for the first time, and usually, the technical requirements are minimal.
            - superscript [ref=e391]:
              - link "[32]" [ref=e392] [cursor=pointer]:
                - /url: "#cite_note-34"
            - text: The O'Neill Festival
            - superscript [ref=e393]:
              - link "[33]" [ref=e394] [cursor=pointer]:
                - /url: "#cite_note-35"
            - text: offers summer retreats for young playwrights to develop their work with directors and actors.
          - paragraph [ref=e395]:
            - text: Playwriting
            - link "collectives" [ref=e396] [cursor=pointer]:
              - /url: /wiki/Collective
            - text: like 13P and Orbiter 3
            - superscript [ref=e397]:
              - link "[34]" [ref=e398] [cursor=pointer]:
                - /url: "#cite_note-36"
            - text: gather members together to produce, rather than develop, new works. The idea of the playwriting collective is in response to plays being stuck in the development process and never advancing to production.
            - superscript [ref=e399]:
              - link "[35]" [ref=e400] [cursor=pointer]:
                - /url: "#cite_note-37"
