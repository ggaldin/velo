# Workflow para Integração Contínua focado em testes unitários com Vitest e Yarn.
# Estrutura preparada para expansão com um único job e steps organizados.
# Executa testes na branch main usando Node.js 24.
name: Continuous Integration
on:
  push:
    branches:
      - main
env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      # Passo 1: Fazer checkout do código
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      # Passo 2: Configurar Node.js com a versão definida
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Passo 3: Habilitar Corepack para usar Yarn
      - name: Enable Corepack
        run: corepack enable
      # Passo 4: Instalar dependências com Yarn
      - name: Install dependencies
        run: yarn install
      # Passo 5: Executar os testes unitários via Vitest
      - name: Run unit tests
        run: yarn test
  
  build-and-deploy:
    name: Build and Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    
    steps:
      # Passo 1: Fazer checkout do código
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      # Passo 2: Configurar Node.js com a versão definida
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Passo 3: Habilitar Corepack para usar Yarn
      - name: Enable Corepack
        run: corepack enable
      # Passo 4: Instalar dependências com Yarn
      - name: Install dependencies
        run: yarn install

      # Passo 5: obter as configurações do vercel
      - name: Pull Vercel config
        run: yarn vercel pull --yes --environment=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE

      # Passo 6: Build para o Vercel
      - name: Build Vercel
        run: yarn vercel build --token=$VERCEL_TOKEN
            
      # 7. Deploy preview no vercel
      - name: Deploy preview
        run: yarn vercel deploy --prebuild --target=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE